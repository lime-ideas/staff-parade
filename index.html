<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no, address=no, date=no">
    <title>2026 Lime Street </title>
    <style>
        :root {
            --tech-gold: #d4af37;
            --bg-dark: #0a0a0a;
            --ui-border: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* FIXED HEADER: Stays at the top center, clear of buttons */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 15px; z-index: 5001; pointer-events: none;
        }
        #header-banner { text-align: center; margin-bottom: 15px; }
        #header-banner h1 { margin: 0; font-size: 18px; font-weight: 800; color: var(--tech-gold); text-transform: uppercase; letter-spacing: 2px; }
        #header-banner p { margin: 2px 0; font-size: 10px; color: #888; }

        /* FIXED MENU: Positioned below the header on mobile to prevent overlap */
        #command-menu {
            pointer-events: auto;
            width: 90%; max-width: 220px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .menu-btn {
            background: rgba(20, 20, 20, 0.95); border: 1px solid var(--ui-border);
            color: white; padding: 10px; border-radius: 6px;
            cursor: pointer; font-size: 11px; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center;
        }
        #staff-dropdown {
            max-height: 0; overflow: hidden; background: rgba(15, 15, 15, 0.98);
            border-radius: 6px; transition: max-height 0.4s ease;
            display: flex; flex-direction: column;
        }
        #staff-dropdown.open { max-height: 250px; overflow-y: auto; border: 1px solid var(--ui-border); }
        .staff-link { padding: 10px; font-size: 12px; color: #ccc; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* RAFFLE POPUP */
        #raffle-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 320px; background: rgba(10, 10, 10, 0.98);
            border: 1px solid var(--tech-gold); border-radius: 12px;
            padding: 20px; z-index: 6000; display: none; backdrop-filter: blur(20px);
        }

        /* STAGE */
        #stage { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; perspective: 1500px; }
        .character { position: absolute; cursor: pointer; z-index: 10; transition: opacity 1.5s ease, transform 0.8s; opacity: 0; }
        .character.active { opacity: 1; }
        .face { width: 60px; height: 60px; border-radius: 50%; border: 2px solid white; background-size: cover; background-position: center; position: relative; z-index: 5; }

        /* RADIATING HERO RING */
        .service-ring {
            position: absolute; border: 1.5px solid var(--tech-gold); border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            opacity: 0; pointer-events: none;
        }
        .hero .service-ring { animation: ring-out 3s infinite; }
        @keyframes ring-out {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(2.8); opacity: 0; }
        }

        /* HERO FOCUS */
        .character.hero {
            top: 50% !important; left: 50% !important;
            margin-top: -40px; margin-left: -40px;
            transform: translate3d(0, 0, 600px) scale(3.5) !important;
            z-index: 9999 !important; animation: none !important; opacity: 1 !important;
        }

        #profile-card { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 320px; background: rgba(5,5,5,0.95);
            border: 1px solid var(--tech-gold); padding: 15px; border-radius: 10px;
            display: none; z-index: 10000; text-align: center;
        }

        @media (max-width: 600px) {
            #header-banner h1 { font-size: 15px; }
            .character.hero { transform: translate3d(0, 0, 200px) scale(2.5) !important; }
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="header-banner">
        <h1>Bear-y Photogenic</h1>
        <p>Staff Appreciation 2026</p>
    </div>

    <div id="command-menu">
        <button class="menu-btn" onclick="syncData()">🔄 SYNC LIVE DATA</button>
        <button class="menu-btn" onclick="toggleRaffle(true)">🏆 RAFFLE WINNERS</button>
        <button class="menu-btn" onclick="toggleDropdown()">👥 STAFF LIST <span>▼</span></button>
        <div id="staff-dropdown"></div>
    </div>
</div>

<div id="raffle-panel">
    <h3 style="margin-top:0; color:var(--tech-gold)">Winners</h3>
    <div id="winner-list-box" style="max-height: 200px; overflow-y: auto; font-size: 13px;"></div>
    <button onclick="toggleRaffle(false)" style="width:100%; margin-top:15px; padding:8px; background:#222; border:1px solid #444; color:white; cursor:pointer">CLOSE</button>
</div>

<div id="stage">
    <div id="logo-hub"><img src="Lime_Street_Elementary_School_logo_template_300.png" style="width:110px;"></div>
</div>

<div id="profile-card"></div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSwz4lMDeYja7-Vluu-B8-StkdVcoMMQSS2-nYsrQxtOSm4SK-IwmJhSpvUlqK5TqrkHZKIVEz_RihC/pub?output=csv";
    let staffAll = [];
    let onStage = []; 
    let autoCloseTimer = null;
    const MAX_ON_STAGE = 25;

    function syncData() { window.location.href = window.location.pathname + "?v=" + new Date().getTime(); }

    async function init() {
        const response = await fetch(csvUrl + "&t=" + new Date().getTime());
        const data = await response.text();
        const rows = data.split('\n').slice(1);
        const winBox = document.getElementById('winner-list-box');
        const dropdown = document.getElementById('staff-dropdown');

        rows.forEach((row, i) => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if(cols.length < 4) return;
            const staff = {
                id: `s-${i}`,
                name: cols[1].replace(/"/g, '').trim(),
                quote: cols[2].replace(/"/g, ''),
                photo: cols[3].trim(),
                years: parseInt(cols[4]) || 1,
                winner: cols[5]?.toLowerCase().includes('yes'),
                prize: cols[6] || ""
            };
            staffAll.push(staff);
            if(staff.winner) {
                winBox.innerHTML += `<div style="padding:5px 0; border-bottom:1px solid #222">${staff.name} - <span style="color:var(--tech-gold)">${staff.prize}</span></div>`;
            }
        });

        staffAll.sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
            const link = document.createElement('div');
            link.className = 'staff-link';
            link.innerText = s.name;
            link.onclick = (e) => { e.stopPropagation(); focusStaff(s.id); };
            dropdown.appendChild(link);
        });

        const initialCount = Math.min(staffAll.length, MAX_ON_STAGE);
        for(let i=0; i<initialCount; i++) { addStaffToStage(staffAll[i].id); }

        if(staffAll.length > MAX_ON_STAGE) { setInterval(rotateStaff, 8000); }
    }

    function addStaffToStage(id) {
        if(onStage.includes(id)) return;
        const staff = staffAll.find(s => s.id === id);
        const char = document.createElement('div');
        char.className = 'character';
        char.id = id;
        
        const rad = 140 + (Math.random() * 150);
        const dur = 25 + (Math.random() * 35);
        const style = document.createElement("style");
        style.id = `style-${id}`;
        style.innerText = `@keyframes orb-${id} { from { transform: rotate(0deg) translateX(${rad}px) rotate(0deg); } to { transform: rotate(360deg) translateX(${rad}px) rotate(-360deg); } }`;
        document.head.appendChild(style);
        char.style.animation = `orb-${id} ${dur}s linear infinite`;

        let gId = "";
        if(staff.photo.includes('id=')) gId = staff.photo.split('id=')[1].split('&')[0];
        else if(staff.photo.includes('/d/')) gId = staff.photo.split('/d/')[1].split('/')[0];
        const img = gId ? `https://lh3.googleusercontent.com/u/0/d/${gId}` : staff.photo;

        let rings = '';
        for(let r=0; r < Math.min(staff.years, 8); r++) {
            rings += `<div class="service-ring" style="animation-delay:${r*0.4}s; width:${60+(r*25)}px; height:${60+(r*25)}px;"></div>`;
        }

        char.innerHTML = `${rings}<div class="face" style="background-image: url('${img}')"></div>`;
        char.onclick = (e) => showHero(staff, char, e);
        document.getElementById('stage').appendChild(char);
        onStage.push(id);
        setTimeout(() => char.classList.add('active'), 100);
    }

    function rotateStaff() {
        const waitingPool = staffAll.filter(s => !onStage.includes(s.id));
        if(waitingPool.length === 0) return;
        const offIdx = Math.floor(Math.random() * onStage.length);
        const targetId = onStage[offIdx];
        const char = document.getElementById(targetId);
        if(!char || char.classList.contains('hero')) return;
        
        char.classList.remove('active');
        onStage = onStage.filter(sid => sid !== targetId);
        setTimeout(() => {
            char.remove();
            const style = document.getElementById(`style-${targetId}`);
            if(style) style.remove();
            addStaffToStage(waitingPool[Math.floor(Math.random() * waitingPool.length)].id);
        }, 1500);
    }

    function focusStaff(id) {
        toggleDropdown();
        if(!onStage.includes(id)) { addStaffToStage(id); }
        setTimeout(() => {
            const char = document.getElementById(id);
            const staff = staffAll.find(s => s.id === id);
            if(char && staff) showHero(staff, char);
        }, 200);
    }

    function showHero(staff, element, e) {
        if(e) e.stopPropagation();
        clearTimeout(autoCloseTimer);
        closeHero();
        element.classList.add('hero');
        const card = document.getElementById('profile-card');
        card.innerHTML = `<h3 style="margin:0; color:var(--tech-gold)">${staff.name}</h3><p style="font-size:11px; color:#888;">${staff.years} Years</p><p style="font-style:italic; font-size:13px; margin-top:8px;">"${staff.quote}"</p>`;
        card.style.display = 'block';
        autoCloseTimer = setTimeout(closeHero, 9000);
    }

    function closeHero() { 
        document.querySelectorAll('.character').forEach(c => c.classList.remove('hero')); 
        document.getElementById('profile-card').style.display = 'none'; 
    }

    function toggleDropdown() { document.getElementById('staff-dropdown').classList.toggle('open'); }
    function toggleRaffle(show) { document.getElementById('raffle-panel').style.display = show ? 'block' : 'none'; }
    document.addEventListener('click', (e) => { if(!e.target.closest('.character')) closeHero(); });
    init();
</script>
</body>
</html>
