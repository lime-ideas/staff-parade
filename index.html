<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STI Staff Excellence - Logo Fix</title>
    <style>
        :root {
            --school-red: #b31b1b;
            --tech-gold: #d4af37;
            --bg-dark: #0a0a0a;
            --ui-border: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: white;
        }

        #canvas-bg { position: absolute; top: 0; left: 0; z-index: 0; }

        /* HEADER */
        #header-banner {
            position: fixed; top: 15px; right: 20px;
            text-align: right; z-index: 2005; pointer-events: none;
        }
        #header-banner h1 { margin: 0; font-size: 16px; letter-spacing: 2px; color: var(--tech-gold); text-transform: uppercase; }
        #header-banner p { margin: 2px 0; font-size: 9px; color: #666; }

        /* MENU CONTROLS */
        #command-menu {
            position: fixed; top: 15px; left: 15px;
            width: 220px; z-index: 3000;
            display: flex; flex-direction: column; gap: 10px;
        }
        .menu-btn {
            background: rgba(20, 20, 20, 0.8); border: 1px solid var(--ui-border);
            color: white; padding: 12px; border-radius: 6px;
            cursor: pointer; font-size: 11px; font-weight: bold;
            text-align: left; transition: all 0.2s; backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
        }
        .menu-btn:hover { border-color: var(--tech-gold); color: var(--tech-gold); }

        #staff-dropdown {
            max-height: 0; overflow: hidden; background: rgba(15, 15, 15, 0.95);
            border-radius: 6px; transition: max-height 0.4s ease;
            display: flex; flex-direction: column;
        }
        #staff-dropdown.open { max-height: 350px; overflow-y: auto; border: 1px solid var(--ui-border); }
        .staff-link { padding: 10px 15px; font-size: 12px; color: #ccc; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .staff-link:hover { background: var(--tech-gold); color: black; }

        /* STAGE & AVATARS */
        #stage { 
            width: 100vw; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            position: relative; z-index: 5; /* Increased z-index */
        }

        /* FIXED LOGO HUB FOR MOBILE */
        #logo-hub { 
            width: 120px; height: 120px; 
            z-index: 100; pointer-events: none;
            display: flex; justify-content: center; align-items: center;
        }
        #logo-hub img {
            width: 100%; height: auto;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
        }
        
        .character { 
            position: absolute; display: flex; flex-direction: column; align-items: center; 
            cursor: pointer; z-index: 10; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .face { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; background-size: cover; background-position: center; position: relative; z-index: 5; }
        
        /* RADIATING SERVICE RINGS */
        .service-ring {
            position: absolute; border-radius: 50%;
            border: 1px solid var(--tech-gold);
            opacity: 0; pointer-events: none;
            transition: all 0.6s ease;
        }
        .hero .service-ring {
            opacity: 0.6;
            animation: ring-pulse 3s infinite alternate;
        }
        @keyframes ring-pulse {
            from { transform: scale(1); opacity: 0.3; }
            to { transform: scale(1.15); opacity: 0.8; border-color: var(--school-red); }
        }

        .winner-glow { border: 3px solid var(--tech-gold) !important; animation: win-pulse 3s infinite ease-in-out; }
        @keyframes win-pulse { 0%, 100% { box-shadow: 0 0 10px var(--tech-gold); } 50% { box-shadow: 0 0 30px var(--tech-gold); } }

        .character.hero {
            animation: none !important; transform: translate(0, 0) scale(2.8) !important;
            top: 50% !important; left: 50% !important; margin-top: -25px; margin-left: -25px; z-index: 9999;
        }

        /* PROFILE & RAFFLE */
        #profile-card { 
            position: fixed; bottom: 20px; left: 20px; width: calc(100% - 40px); max-width: 300px;
            background: rgba(15,15,15,0.95); border: 1px solid var(--tech-gold); 
            padding: 20px; border-radius: 8px; display: none; z-index: 4000; backdrop-filter: blur(15px);
        }
        #raffle-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 350px; background: rgba(10, 10, 10, 0.98);
            border: 1px solid var(--tech-gold); border-radius: 12px;
            padding: 25px; z-index: 5000; display: none; backdrop-filter: blur(20px);
        }

        @media (max-width: 600px) {
            #logo-hub { width: 100px; height: 100px; }
            .character.hero { transform: translate(0, 0) scale(2.2) !important; }
        }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div id="header-banner">
    <h1>Staff Excellence</h1>
    <p>STI // APPRECIATION WEEK</p>
</div>

<div id="command-menu">
    <button class="menu-btn" onclick="location.reload()" style="border-color: var(--tech-gold)">🔄 SYNC LIVE DATA</button>
    <button class="menu-btn" onclick="toggleRaffle(true)">🏆 RAFFLE WINNERS <span>›</span></button>
    <button class="menu-btn" onclick="toggleDropdown()">👥 STAFF LIST <span id="drop-arrow">▼</span></button>
    <div id="staff-dropdown"></div>
</div>

<div id="stage">
    <!-- Ensure Logo Hub has an image nested inside -->
    <div id="logo-hub">
        <img src="Lime_Street_Elementary_School_logo_template_300.png" alt="STI LOGO">
    </div>
</div>

<div id="raffle-panel">
    <h2 style="margin-top:0; color:var(--tech-gold); border-bottom:1px solid #333; padding-bottom:10px">Winners</h2>
    <div id="winner-list-box" style="max-height: 250px; overflow-y: auto;"></div>
    <button onclick="toggleRaffle(false)" style="width:100%; margin-top:20px; background:none; border:1px solid #444; color:white; padding:12px; border-radius:6px; cursor:pointer">CLOSE</button>
</div>

<div id="profile-card"></div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSwz4lMDeYja7-Vluu-B8-StkdVcoMMQSS2-nYsrQxtOSm4SK-IwmJhSpvUlqK5TqrkHZKIVEz_RihC/pub?output=csv";
    let staffData = [];
    let autoCloseTimer = null;

    async function init() {
        const response = await fetch(csvUrl);
        const data = await response.text();
        const rows = data.split('\n').slice(1);
        
        const dropdown = document.getElementById('staff-dropdown');
        const winBox = document.getElementById('winner-list-box');

        rows.forEach((row, i) => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if(cols.length < 4) return;
            
            const staff = {
                id: `staff-${i}`,
                name: cols[1].replace(/"/g, '').trim(),
                quote: cols[2].replace(/"/g, ''),
                photo: cols[3].trim(),
                years: parseInt(cols[4]) || 1,
                isWinner: cols[5]?.toLowerCase().includes('yes'),
                prize: cols[6] || "Gift"
            };
            staffData.push(staff);
            createAvatar(staff, i);

            if(staff.isWinner) {
                winBox.innerHTML += `<div style="padding:10px; border-bottom:1px solid #222"><b style="color:var(--tech-gold)">${staff.name}</b><br><small>${staff.prize}</small></div>`;
            }
        });

        staffData.sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
            const link = document.createElement('div');
            link.className = 'staff-link';
            link.innerText = s.name;
            link.onclick = () => { focusStaff(s.id); toggleDropdown(); };
            dropdown.appendChild(link);
        });
    }

    function createAvatar(staff, index) {
        const char = document.createElement('div');
        char.className = 'character';
        char.id = staff.id;
        const radius = window.innerWidth < 600 ? 120 + (Math.random() * 80) : 220 + (Math.random() * 300);
        const duration = 40 + (Math.random() * 40);
        
        const style = document.createElement("style");
        style.innerText = `@keyframes orbit${index} { 
            from { transform: rotate(0deg) translateX(${radius}px) rotate(0deg); } 
            to { transform: rotate(360deg) translateX(${radius}px) rotate(-360deg); } 
        }`;
        document.head.appendChild(style);
        char.style.animation = `orbit${index} ${duration}s linear infinite`;

        let id = staff.photo.includes('id=') ? staff.photo.split('id=')[1].split('&')[0] : 
                 staff.photo.includes('/d/') ? staff.photo.split('/d/')[1].split('/')[0] : "";
        const img = id ? `https://lh3.googleusercontent.com/u/0/d/${id}` : staff.photo;

        let ringsHtml = '';
        const ringCount = Math.min(staff.years, 5);
        for(let r=1; r<=ringCount; r++) {
            const size = 50 + (r * 15);
            ringsHtml += `<div class="service-ring" style="width:${size}px; height:${size}px; top:calc(50% - ${size/2}px); left:calc(50% - ${size/2}px); animation-delay:${r*0.3}s"></div>`;
        }

        char.innerHTML = `${ringsHtml}<div class="face ${staff.isWinner ? 'winner-glow' : ''}" style="background-image: url('${img}')"></div>`;
        char.onclick = (e) => showHero(staff, char, e);
        document.getElementById('stage').appendChild(char);
    }

    function toggleDropdown() {
        const d = document.getElementById('staff-dropdown');
        const arrow = document.getElementById('drop-arrow');
        d.classList.toggle('open');
        arrow.innerText = d.classList.contains('open') ? '▲' : '▼';
    }

    function focusStaff(id) {
        const char = document.getElementById(id);
        if(char) char.click();
    }

    function showHero(staff, element, e) {
        if(e) e.stopPropagation();
        clearTimeout(autoCloseTimer);
        document.querySelectorAll('.character').forEach(c => c.classList.remove('hero'));
        element.classList.add('hero');
        const card = document.getElementById('profile-card');
        card.innerHTML = `
            <h3 style="margin:0; color:var(--tech-gold)">${staff.name}</h3>
            <p style="font-size:10px; color:#555; margin-bottom:10px">${staff.years} Years of Service</p>
            <p style="font-style:italic; font-size:13px">"${staff.quote}"</p>
            <div style="font-size: 8px; color: #444; margin-top: 10px; text-transform: uppercase;">Closing in 10s...</div>
        `;
        card.style.display = 'block';
        autoCloseTimer = setTimeout(() => { closeHero(); }, 10000);
    }

    function toggleRaffle(show) { document.getElementById('raffle-panel').style.display = show ? 'block' : 'none'; }
    function closeHero() { 
        document.querySelectorAll('.character').forEach(c => c.classList.remove('hero')); 
        document.getElementById('profile-card').style.display = 'none'; 
    }
    
    document.addEventListener('click', (e) => {
        if(!e.target.closest('.character') && !e.target.closest('#profile-card') && !e.target.closest('#command-menu')) {
            closeHero();
        }
    });

    init();
</script>
</body>
</html>
