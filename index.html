<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Lime Street - Fixed Dropdown</title>
    <style>
        :root {
            --school-red: #b31b1b;
            --tech-gold: #d4af37;
            --bg-dark: #0a0a0a;
            --ui-border: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: white;
        }

        #canvas-bg { position: absolute; top: 0; left: 0; z-index: 0; }

        /* HEADER */
        #header-banner {
            position: fixed; top: 15px; right: 20px;
            text-align: right; z-index: 2005; pointer-events: none;
        }
        #header-banner h1 { margin: 0; font-size: 16px; font-weight: 800; letter-spacing: 2px; color: var(--tech-gold); text-transform: uppercase; }
        #header-banner p { margin: 2px 0; font-size: 10px; color: #888; }

        /* MENU CONTROLS */
        #command-menu {
            position: fixed; top: 15px; left: 15px;
            width: 220px; z-index: 5000; /* High priority */
            display: flex; flex-direction: column; gap: 10px;
        }
        .menu-btn {
            background: rgba(20, 20, 20, 0.85); border: 1px solid var(--ui-border);
            color: white; padding: 12px; border-radius: 6px;
            cursor: pointer; font-size: 11px; font-weight: bold;
            text-align: left; transition: all 0.2s; backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
        }
        .menu-btn:hover { border-color: var(--tech-gold); }

        #staff-dropdown {
            max-height: 0; overflow: hidden; background: rgba(15, 15, 15, 0.98);
            border-radius: 6px; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; z-index: 5001;
        }
        #staff-dropdown.open { max-height: 350px; overflow-y: auto; border: 1px solid var(--ui-border); }
        .staff-link { padding: 12px 15px; font-size: 12px; color: #ccc; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .staff-link:hover { background: var(--tech-gold); color: black; }

        /* STAGE */
        #stage { 
            width: 100vw; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            position: relative; z-index: 5;
            perspective: 1200px;
        }

        #logo-hub { 
            width: 120px; height: 120px; 
            z-index: 100; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
        }
        #logo-hub img { width: 100%; height: auto; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4)); }
        
        .character { 
            position: absolute; display: flex; flex-direction: column; align-items: center; 
            cursor: pointer; z-index: 10; transition: opacity 1s, transform 0.5s;
        }
        .face { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; background-size: cover; background-position: center; position: relative; z-index: 5; }
        
        /* HERO STATE */
        .character.hero {
            animation: none !important; transform: translate3d(0, 0, 400px) scale(3) !important;
            top: 50% !important; left: 50% !important; margin-top: -25px; margin-left: -25px; 
            z-index: 9000 !important; opacity: 1 !important; filter: none !important;
        }

        .service-ring {
            position: absolute; border-radius: 50%; border: 1px solid var(--tech-gold);
            opacity: 0; pointer-events: none; transition: all 0.6s ease;
        }
        .hero .service-ring { opacity: 0.6; animation: ring-pulse 3s infinite alternate; }
        @keyframes ring-pulse { from { transform: scale(1); opacity: 0.3; } to { transform: scale(1.15); opacity: 0.8; border-color: var(--school-red); } }

        .winner-glow { border: 3px solid var(--tech-gold) !important; animation: win-pulse 3s infinite ease-in-out; }
        @keyframes win-pulse { 0%, 100% { box-shadow: 0 0 10px var(--tech-gold); } 50% { box-shadow: 0 0 30px var(--tech-gold); } }

        #profile-card { 
            position: fixed; bottom: 20px; left: 20px; width: calc(100% - 40px); max-width: 300px;
            background: rgba(15,15,15,0.95); border: 1px solid var(--tech-gold); 
            padding: 20px; border-radius: 8px; display: none; z-index: 10000; backdrop-filter: blur(15px);
        }

        /* MOBILE FIX */
        @media (max-width: 600px) {
            #header-banner { top: 10px; right: 0; left: 0; text-align: center; width: 100%; }
            #header-banner h1 { font-size: 14px; }
            #command-menu { top: 60px; left: 50%; transform: translateX(-50%); width: 90%; }
            #logo-hub { width: 90px; height: 90px; }
            .character.hero { transform: translate3d(0, 0, 200px) scale(2.5) !important; }
        }
    </style>
</head>
<body>

<div id="header-banner">
    <h1>STAFF APPRECIATION 2026</h1>
    <p>Honoring every one of our Lime Street Staff members</p>
</div>

<div id="command-menu">
    <button class="menu-btn" onclick="location.reload()" style="border-color: var(--tech-gold)">🔄 SYNC LIVE DATA</button>
    <button class="menu-btn" onclick="toggleRaffle(true)">🏆 RAFFLE WINNERS <span>›</span></button>
    <!-- ADDED THE ID "drop-arrow" BACK IN HERE -->
    <button class="menu-btn" onclick="toggleDropdown()">👥 STAFF LIST <span id="drop-arrow">▼</span></button>
    <div id="staff-dropdown"></div>
</div>

<div id="stage">
    <div id="logo-hub" onclick="shuffleOrbits()">
        <img src="Lime_Street_Elementary_School_logo_template_300.png" alt="STI LOGO">
    </div>
</div>

<div id="profile-card"></div>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSwz4lMDeYja7-Vluu-B8-StkdVcoMMQSS2-nYsrQxtOSm4SK-IwmJhSpvUlqK5TqrkHZKIVEz_RihC/pub?output=csv";
    let staffData = [];
    let autoCloseTimer = null;

    async function init() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            const dropdown = document.getElementById('staff-dropdown');

            rows.forEach((row, i) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(cols.length < 4) return;
                const staff = {
                    id: `staff-${i}`,
                    name: cols[1].replace(/"/g, '').trim(),
                    quote: cols[2].replace(/"/g, ''),
                    photo: cols[3].trim(),
                    years: parseInt(cols[4]) || 1,
                    isWinner: cols[5]?.toLowerCase().includes('yes')
                };
                staffData.push(staff);
                createAvatar(staff, i);
            });

            staffData.sort((a,b) => a.name.localeCompare(b.name)).forEach(s => {
                const link = document.createElement('div');
                link.className = 'staff-link';
                link.innerText = s.name;
                link.onclick = (e) => { 
                    e.stopPropagation();
                    focusStaff(s.id); 
                    toggleDropdown(); 
                };
                dropdown.appendChild(link);
            });
        } catch (e) { console.error(e); }
    }

    function createAvatar(staff, index) {
        const char = document.createElement('div');
        char.className = 'character';
        char.id = staff.id;
        applyOrbit(char, index);

        let id = staff.photo.includes('id=') ? staff.photo.split('id=')[1].split('&')[0] : 
                 staff.photo.includes('/d/') ? staff.photo.split('/d/')[1].split('/')[0] : "";
        const img = id ? `https://lh3.googleusercontent.com/u/0/d/${id}` : staff.photo;

        let ringsHtml = '';
        for(let r=1; r<=Math.min(staff.years, 5); r++) {
            const size = 50 + (r * 15);
            ringsHtml += `<div class="service-ring" style="width:${size}px; height:${size}px; top:calc(50% - ${size/2}px); left:calc(50% - ${size/2}px); animation-delay:${r*0.3}s"></div>`;
        }

        char.innerHTML = `${ringsHtml}<div class="face ${staff.isWinner ? 'winner-glow' : ''}" style="background-image: url('${img}')"></div>`;
        char.onclick = (e) => showHero(staff, char, e);
        document.getElementById('stage').appendChild(char);
    }

    function applyOrbit(element, index) {
        const isBackground = Math.random() > 0.5;
        const radius = isBackground ? 380 + (Math.random() * 450) : 160 + (Math.random() * 220);
        const duration = 35 + (Math.random() * 65);
        const depth = isBackground ? -250 : 0;
        element.style.opacity = isBackground ? "0.35" : "1";
        element.style.filter = isBackground ? "blur(1.5px)" : "none";
        const animName = `orbit${index}_${Math.floor(Math.random()*10000)}`;
        const style = document.createElement("style");
        style.innerText = `@keyframes ${animName} { 
            from { transform: translate3d(0,0,${depth}px) rotate(0deg) translateX(${radius}px) rotate(0deg); } 
            to { transform: translate3d(0,0,${depth}px) rotate(360deg) translateX(${radius}px) rotate(-360deg); } 
        }`;
        document.head.appendChild(style);
        element.style.animation = `${animName} ${duration}s linear infinite`;
    }

    function shuffleOrbits() {
        document.querySelectorAll('.character').forEach((char, i) => {
            if(!char.classList.contains('hero')) applyOrbit(char, i);
        });
    }

    function toggleDropdown() {
        const d = document.getElementById('staff-dropdown');
        const arrow = document.getElementById('drop-arrow');
        d.classList.toggle('open');
        if(arrow) arrow.innerText = d.classList.contains('open') ? '▲' : '▼';
    }

    function focusStaff(id) {
        const char = document.getElementById(id);
        if(char) {
            const staff = staffData.find(s => s.id === id);
            showHero(staff, char);
        }
    }

    function showHero(staff, element, e) {
        if(e) e.stopPropagation();
        clearTimeout(autoCloseTimer);
        document.querySelectorAll('.character').forEach(c => c.classList.remove('hero'));
        element.classList.add('hero');
        const card = document.getElementById('profile-card');
        card.innerHTML = `
            <h3 style="margin:0; color:var(--tech-gold)">${staff.name}</h3>
            <p style="font-size:10px; color:#555; margin-bottom:10px">${staff.years} Years of Service</p>
            <p style="font-style:italic; font-size:13px">"${staff.quote}"</p>
        `;
        card.style.display = 'block';
        autoCloseTimer = setTimeout(() => { closeHero(); }, 15000);
    }

    function closeHero() { 
        document.querySelectorAll('.character').forEach(c => c.classList.remove('hero')); 
        document.getElementById('profile-card').style.display = 'none'; 
    }
    
    document.addEventListener('click', (e) => {
        if(!e.target.closest('.character') && !e.target.closest('#profile-card') && !e.target.closest('#command-menu')) {
            closeHero();
            const d = document.getElementById('staff-dropdown');
            if(d.classList.contains('open')) toggleDropdown();
        }
    });

    init();
</script>
</body>
</html>
