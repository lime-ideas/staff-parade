<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Appreciation Parade</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #fff7cc, #ffd6ec 35%, #bde7ff 70%, #d7ffd9);
      color: #111827;
    }
    #stage { position: fixed; inset: 0; overflow: hidden; }

    .admin-bar {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 90; display: none; gap: 8px; flex-wrap: wrap; justify-content: center;
      width: min(96vw, 1100px); padding: 10px; background: rgba(255,255,255,.95);
      border-radius: 24px; box-shadow: 0 10px 28px rgba(0,0,0,.18);
    }
    .admin-bar.show { display: flex; }
    .sheet-input { width: min(430px, 86vw); padding: 10px 13px; border: 2px solid #cbd5e1; border-radius: 999px; font-weight: 700; }
    .btn, label.upload-btn, .top-btn {
      border: 4px solid #111827; padding: 9px 14px; border-radius: 999px; background: white; color: #111827;
      font-weight: 1000; cursor: pointer; box-shadow: 0 6px 0 rgba(17,24,39,.25); font-size: 14px;
    }
    .btn { border: 0; background: #0ea5e9; color: white; box-shadow: 0 5px 0 #0369a1; }
    .btn.green { background:#22c55e; box-shadow:0 5px 0 #15803d; }
    .btn.purple { background:#8b5cf6; box-shadow:0 5px 0 #5b21b6; }
    .btn.pink { background:#ec4899; box-shadow:0 5px 0 #9d174d; }
    .btn.dark { background:#334155; box-shadow:0 5px 0 #0f172a; }
    input[type="file"] { display:none; }

    #refreshBtn { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 50; background: linear-gradient(135deg,#fff,#fef3c7,#fde68a); }
    #refreshBtn span { display:block; font-size:9px; opacity:.7; text-transform:uppercase; letter-spacing:.04em; }
    #winnersBtn { position: fixed; top: 72px; left: calc(50% - 92px); transform: translateX(-50%); z-index: 50; }
    #staffBtn { position: fixed; top: 72px; left: calc(50% + 92px); transform: translateX(-50%); z-index: 50; }

    .doorway {
      position: fixed; right: 7vw; top: 40%; width: 130px; height: 190px; z-index: 5;
      border: 8px solid #111827; border-bottom: 0; border-radius: 70px 70px 8px 8px;
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(254,243,199,.75));
      box-shadow: inset 0 0 0 8px rgba(255,255,255,.55), 0 12px 30px rgba(0,0,0,.22);
      display:flex; align-items:flex-start; justify-content:center; padding-top:18px; font-weight:1000; text-align:center; pointer-events:none;
    }

    .footer-note { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 20; background: rgba(255,255,255,.84); border-radius:999px; padding:8px 14px; font-weight:900; font-size:13px; }

    .character { position:absolute; width:88px; height:150px; transform-origin:center bottom; will-change:transform; cursor:pointer; user-select:none; }
    .character.spotlight { filter: drop-shadow(0 0 20px #fde047) drop-shadow(0 0 28px #0ea5e9); z-index: 96 !important; }
    .head { position:absolute; top:0; left:50%; transform:translateX(-50%); width:54px; height:54px; border-radius:50%; overflow:hidden; border:4px solid #fff; background:white; box-shadow:0 5px 12px rgba(0,0,0,.25); z-index:4; }
    .head img { width:100%; height:100%; object-fit:cover; }
    .name-tag { position:absolute; top:62px; left:50%; transform:translateX(-50%); width:70px; height:52px; border-radius:16px; background:linear-gradient(135deg,#fff,#e0f2fe); border:3px solid #111827; display:flex; align-items:center; justify-content:center; text-align:center; font-size:10px; font-weight:1000; padding:4px; overflow:hidden; z-index:3; }
    .arm,.leg { position:absolute; background:#111827; border-radius:999px; transform-origin:top center; animation:swing .55s infinite alternate ease-in-out; z-index:1; }
    .arm { width:6px; height:34px; top:70px; }
    .arm.left { left:16px; } .arm.right { right:16px; animation-delay:-.55s; }
    .leg { width:7px; height:34px; top:112px; }
    .leg.left { left:30px; animation-delay:-.55s; } .leg.right { right:30px; }
    @keyframes swing { from { rotate:-10deg; } to { rotate:10deg; } }

    .winner-chain { position:absolute; top:108px; left:50%; transform:translateX(-50%); z-index:9; width:82px; display:none; pointer-events:none; filter:drop-shadow(0 5px 7px rgba(0,0,0,.35)); }
    .is-winner .winner-chain { display:block; }
    .chain-loop { width:56px; height:22px; margin:0 auto -6px; border:6px dashed #fbbf24; border-bottom:0; border-radius:60px 60px 0 0; }
    .chain-medal { width:78px; height:38px; margin:0 auto; border-radius:14px; background:linear-gradient(135deg,#fff7ad,#f59e0b 45%,#fef3c7 75%,#b45309); border:3px solid #78350f; display:flex; align-items:center; justify-content:center; text-align:center; font-size:8px; line-height:.95; font-weight:1000; }

    .quote-bubble { position:absolute; left:68px; top:-18px; width:230px; min-height:74px; padding:12px 14px; border-radius:22px; background:white; border:4px solid #111827; box-shadow:0 12px 24px rgba(0,0,0,.24); font-size:15px; line-height:1.22; font-weight:800; display:none; z-index:100; }
    .character.show-quote .quote-bubble { display:block; }
    .quote-name { display:block; color:#ec4899; font-size:13px; text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px; }
    .bubble-label { display:inline-block; margin-bottom:6px; padding:3px 8px; border-radius:999px; background:#fef3c7; border:2px solid #111827; font-size:12px; font-weight:1000; }
    .bubble-text { display:block; }

    .modal { position:fixed; inset:0; z-index:120; display:none; align-items:center; justify-content:center; background:rgba(15,23,42,.55); text-align:center; padding:20px; }
    .modal-card { width:min(92vw,760px); max-height:88vh; overflow-y:auto; padding:30px; border-radius:34px; background:white; box-shadow:0 25px 70px rgba(0,0,0,.35); border:8px solid #fde047; }
    .modal-card h2 { margin:0 0 12px; font-size:clamp(30px,7vw,70px); color:#ec4899; }
    .winners-list-big,.staff-list-big { display:grid; gap:12px; margin-top:16px; }
    .staff-list-big { grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); }
    .winner-row,.staff-row { padding:14px; border:4px solid #111827; border-radius:22px; background:#fef3c7; box-shadow:0 6px 0 #fbbf24; font-size:clamp(18px,3vw,32px); font-weight:1000; }
    .staff-row { background:#e0f2fe; box-shadow:0 5px 0 #38bdf8; font-size:18px; cursor:pointer; }
    .winner-row span { color:#ec4899; }
    .confetti { position:fixed; top:-20px; width:12px; height:18px; opacity:.9; z-index:130; animation:fall 4s linear forwards; }
    @keyframes fall { to { transform:translateY(110vh) rotate(720deg); } }
  </style>
</head>
<body>
  <div id="stage"></div>
  <div class="admin-bar" id="adminBar">
    <input class="sheet-input" id="sheetUrl" placeholder="Paste published Google Sheet CSV link" />
    <button class="btn purple" id="loadSheetBtn">Load Responses</button>
    <label class="upload-btn" for="photoInput">Manual Upload</label>
    <input id="photoInput" type="file" accept="image/*" multiple />
    <button class="btn green" id="addWinnerBtn">Add Winner</button>
    <button class="btn dark" id="clearBtn">Clear</button>
  </div>

  <button class="top-btn" id="refreshBtn">🎉 Celebrating the Staff 🎉<span>tap to refresh the page</span></button>
  <button class="top-btn" id="winnersBtn">🏆 Raffle Winners</button>
  <button class="top-btn" id="staffBtn">📋 Staff List</button>
  <div class="doorway">STAFF<br>SPOTLIGHT<br>DOOR</div>
  <div class="footer-note">Tap a selfie to reveal their message 👀</div>

  <div class="modal" id="winnersModal"><div class="modal-card"><h2>🏆 Raffle Winners</h2><div id="winnersListBig" class="winners-list-big"></div><button class="btn pink" id="closeWinnersBtn">Back to Parade</button></div></div>
  <div class="modal" id="staffModal"><div class="modal-card"><h2>📋 Staff List</h2><div id="staffListBig" class="staff-list-big"></div><button class="btn pink" id="closeStaffBtn">Back to Parade</button></div></div>

  <script>
    const DEFAULT_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSwz4lMDeYja7-Vluu-B8-StkdVcoMMQSS2-nYsrQxtOSm4SK-IwmJhSpvUlqK5TqrkHZKIVEz_RihC/pub?output=csv';
    const MAX_PEOPLE = 110;
    const stage = document.getElementById('stage');
    const adminBar = document.getElementById('adminBar');
    const sheetUrlInput = document.getElementById('sheetUrl');
    const loadSheetBtn = document.getElementById('loadSheetBtn');
    const photoInput = document.getElementById('photoInput');
    const addWinnerBtn = document.getElementById('addWinnerBtn');
    const clearBtn = document.getElementById('clearBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const winnersBtn = document.getElementById('winnersBtn');
    const staffBtn = document.getElementById('staffBtn');
    const winnersModal = document.getElementById('winnersModal');
    const staffModal = document.getElementById('staffModal');
    const closeWinnersBtn = document.getElementById('closeWinnersBtn');
    const closeStaffBtn = document.getElementById('closeStaffBtn');
    const winnersListBig = document.getElementById('winnersListBig');
    const staffListBig = document.getElementById('staffListBig');
    let people = [];
    let winners = [];
    const isAdmin = new URLSearchParams(location.search).get('admin') === '1';
    if (isAdmin) adminBar.classList.add('show');

    function rand(a,b){return Math.random()*(b-a)+a;}
    function esc(v){return String(v||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
    function fallbackFace(){return 'data:image/svg+xml;charset=utf-8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect width="200" height="200" fill="white"/><circle cx="100" cy="100" r="78" fill="#fde68a"/><circle cx="75" cy="85" r="10" fill="#111827"/><circle cx="125" cy="85" r="10" fill="#111827"/><path d="M65 120 Q100 150 135 120" stroke="#111827" stroke-width="9" fill="none" stroke-linecap="round"/></svg>');}
    function driveImage(url){const t=String(url||'').trim();const m=t.match(/[?&]id=([^&]+)/)||t.match(/\/d\/([^/]+)/);return m&&m[1]?'https://drive.google.com/thumbnail?id='+m[1]+'&sz=w700':t;}

    function makeCharacter(d){
      const name=d.name||'Staff', quote=d.quote||'Happy Staff Appreciation Week!', would=d.would||'', isWinner=String(d.raffleWinner||'').trim().toLowerCase()==='yes';
      const el=document.createElement('div');
      el.className=isWinner?'character is-winner':'character';
      el.dataset.mode='quote';
      el.innerHTML='<div class="quote-bubble"><span class="quote-name">'+esc(name)+'</span><span class="bubble-label">💬 Quote</span><span class="bubble-text">“'+esc(quote)+'”</span></div><div class="head"><img alt="'+esc(name)+'"></div><div class="name-tag">'+esc(name)+'</div><div class="winner-chain"><div class="chain-loop"></div><div class="chain-medal">RAFFLE<br>WINNER</div></div><div class="arm left"></div><div class="arm right"></div><div class="leg left"></div><div class="leg right"></div>';
      const img=el.querySelector('img'); img.src=d.src||fallbackFace(); img.onerror=function(){img.src=fallbackFace();};
      el.addEventListener('click',function(e){e.stopPropagation();showPerson(people.findIndex(p=>p.el===el));});
      stage.appendChild(el);
      people.push({el,name,quote,would,progress:Math.random(),speed:rand(.00008,.00022),lane:Math.floor(rand(0,4)),scale:rand(.82,1.05),spotlightUntil:0});
      renderStaffList();
    }

    function clearAll(){people.forEach(p=>p.el.remove());people=[];winners=[];renderWinners();renderStaffList();}
    function parseCSV(text){const rows=[];let row=[],cell='',q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(c==='"'&&q&&n==='"'){cell+='"';i++;}else if(c==='"')q=!q;else if(c===','&&!q){row.push(cell);cell='';}else if((c==='\n'||c==='\r')&&!q){if(cell||row.length){row.push(cell);rows.push(row);row=[];cell='';}if(c==='\r'&&n==='\n')i++;}else cell+=c;}if(cell||row.length){row.push(cell);rows.push(row);}return rows;}

    async function loadSheetCSV(url){
      try{
        const res=await fetch(url||sheetUrlInput.value.trim()||DEFAULT_CSV); if(!res.ok)throw new Error('Could not load sheet');
        const rows=parseCSV(await res.text()).filter(r=>r.some(c=>String(c).trim()!=='')); if(rows.length<2)return;
        const h=rows[0].map(x=>String(x).trim().toLowerCase());
        const ni=h.findIndex(x=>x.includes('name')), qi=h.findIndex(x=>x.includes('quote')), wi=h.findIndex(x=>x.includes('would')), ii=h.findIndex(x=>x.includes('photo')||x.includes('selfie')||x.includes('pic')||x.includes('image')), ri=h.findIndex(x=>x.includes('raffle winner')), pi=h.findIndex(x=>x.includes('prize'));
        if(ni<0)throw new Error('Missing Name column');
        people.forEach(p=>p.el.remove()); people=[]; winners=[];
        rows.slice(1,MAX_PEOPLE+1).forEach(row=>{const name=row[ni]||'Staff', raffle=ri>=0?row[ri]:'', prize=pi>=0?row[pi]:''; if(String(raffle).trim().toLowerCase()==='yes')winners.push({name,prize:prize||'Prize Bag'}); makeCharacter({name,quote:qi>=0?row[qi]:'',would:wi>=0?row[wi]:'',src:ii>=0?driveImage(row[ii]):fallbackFace(),raffleWinner:raffle});});
        renderWinners(); renderStaffList();
      }catch(err){console.error(err); if(isAdmin)alert(err.message);}
    }

    function renderWinners(){winnersListBig.innerHTML=winners.length?winners.map(w=>'<div class="winner-row">🎉 <strong>'+esc(w.name)+'</strong><br><span>'+esc(w.prize)+'</span></div>').join(''):'<div class="winner-row">No winners yet</div>';}
    function renderStaffList(){staffListBig.innerHTML=people.length?people.map((p,i)=>'<button class="staff-row" data-index="'+i+'">'+esc(p.name)+'</button>').join(''):'<div class="winner-row">No staff loaded yet</div>';}
    function showPerson(i){const p=people[i]; if(!p)return; staffModal.style.display='none'; people.forEach(x=>{x.el.classList.remove('spotlight','show-quote');}); p.spotlightUntil=Date.now()+9000; p.progress=.47; p.el.classList.add('spotlight','show-quote'); const lab=p.el.querySelector('.bubble-label'), txt=p.el.querySelector('.bubble-text'); lab.textContent='💬 Quote'; txt.textContent='“'+p.quote+'”'; launchConfetti(1);}

    function point(t,lane){const mx=105+lane*16,my=150+lane*14,w=Math.max(280,innerWidth-mx*2),h=Math.max(210,innerHeight-my*2),per=2*(w+h);let d=(t%1)*per;if(d<w)return{x:mx+d,y:my};d-=w;if(d<h)return{x:mx+w,y:my+d};d-=h;if(d<w)return{x:mx+w-d,y:my+h};d-=w;return{x:mx,y:my+h-d};}
    function animate(){const now=Date.now();people.forEach(p=>{p.progress+=p.speed;const pos=point(p.progress,p.lane);const near=pos.x>innerWidth-240&&pos.x<innerWidth-30&&pos.y>innerHeight*.32&&pos.y<innerHeight*.72;const spot=now<p.spotlightUntil;const sc=spot?1.9:(near?1.45:p.scale);p.el.style.zIndex=spot?96:(near?70:20+p.lane);p.el.style.transform='translate('+pos.x+'px,'+pos.y+'px) scale('+sc+')';});requestAnimationFrame(animate);}
    function launchConfetti(b){const colors=['#f43f5e','#0ea5e9','#22c55e','#fde047','#a855f7','#f97316'];let count=0,total=b||1;const timer=setInterval(()=>{for(let i=0;i<70;i++){const pc=document.createElement('div');pc.className='confetti';pc.style.left=rand(0,100)+'vw';pc.style.background=colors[Math.floor(Math.random()*colors.length)];pc.style.animationDelay=rand(0,.4)+'s';document.body.appendChild(pc);setTimeout(()=>pc.remove(),4700);}count++;if(count>=total)clearInterval(timer);},450);}

    document.body.addEventListener('click',()=>document.querySelectorAll('.character.show-quote').forEach(c=>c.classList.remove('show-quote')));
    loadSheetBtn.addEventListener('click',()=>loadSheetCSV());
    photoInput.addEventListener('change',e=>Array.from(e.target.files).forEach(file=>{const r=new FileReader();r.onload=ev=>makeCharacter({src:ev.target.result,name:prompt('Name?','Staff')||'Staff',quote:prompt('Quote?','')||'',would:prompt('Would You Rather?','')||''});r.readAsDataURL(file);}));
    addWinnerBtn.addEventListener('click',()=>{const name=prompt('Winner name:','Cafeteria Lady'); if(!name)return; const prize=prompt('Prize:','Small Red Bag')||'Prize'; winners.push({name,prize}); renderWinners(); winnersModal.style.display='flex'; launchConfetti(3);});
    clearBtn.addEventListener('click',clearAll);
    winnersBtn.addEventListener('click',()=>{renderWinners();winnersModal.style.display='flex';launchConfetti(2);});
    closeWinnersBtn.addEventListener('click',()=>winnersModal.style.display='none');
    staffBtn.addEventListener('click',()=>{renderStaffList();staffModal.style.display='flex';});
    closeStaffBtn.addEventListener('click',()=>staffModal.style.display='none');
    staffListBig.addEventListener('click',e=>{const b=e.target.closest('button'); if(b&&b.dataset.index)showPerson(Number(b.dataset.index));});
    refreshBtn.addEventListener('click',()=>{launchConfetti(4);setTimeout(()=>location.reload(),1600);});

    renderWinners(); renderStaffList(); loadSheetCSV(DEFAULT_CSV); setTimeout(()=>launchConfetti(3),700); animate();
  </script>
</body>
</html>
